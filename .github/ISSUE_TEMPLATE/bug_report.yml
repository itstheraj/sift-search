name: Bug report
description: Something in Sift does not work
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected, and what you got instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. sift reindex ~/Documents
        2. sift search "..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: paths
    attributes:
      label: Output of `sift paths` and `sift status`
      render: shell
    validations:
      required: true

  - type: input
    id: plasma
    attributes:
      label: Distro and Plasma version
      placeholder: Fedora 42, Plasma 6.3.4
    validations:
      required: true

  - type: dropdown
    id: profile
    attributes:
      label: Profile
      options: [light, medium, heavy]
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device setting
      description: The `device` value under `[resources]` in your config.
      placeholder: cpu
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Run the failing command again and paste what it printed.
      render: shell
